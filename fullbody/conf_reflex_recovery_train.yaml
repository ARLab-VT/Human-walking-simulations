defaults:
  - conf_fullbody_gmr
  - _self_

wandb:
  tags: ["reflex-recovery", "train"]

experiment:
  resume_from: null
  env_params:
    perturbation_params:
      enabled: true
      joint: ankle
      side: right
      direction: 1
      magnitude_nm: 10.0
      duration_s: 0.05
      onset_mode: time
      onset_time_s: 1.0
      waveform: half_sine
    reflex_params:
      enabled: true
      scale: 1.0
      group_limit: 0.25
      muscle_limit: 0.25
      rate_limit_per_s: 5.0
      # Conservative initial values; tune and validate before interpreting physiologically.
      stance_gains:
        position: 0.05
        velocity: 0.01
      swing_gains:
        position: 0.03
        velocity: 0.01
  reflex_recovery:
    enabled: true
    freeze_base_policy: true
    base_checkpoint: "hf://amathislab/mm-fullbody-base"
    motion_path: "KIT/314/walking_medium09_poses"
    curriculum_level: 2
    reflex:
      enabled: true
      scale: 1.0
      delay_s: 0.03
    recovery:
      enabled: true
      hidden_layers: [128, 128]
      grouped_actions: true
    perturbation:
      enabled: true
      joint: ankle
      side: right
      direction: 1
      magnitude_nm: 10.0
      duration_s: 0.05
      onset_mode: time
      onset_time_s: 1.0
      waveform: half_sine
